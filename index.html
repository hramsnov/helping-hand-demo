<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donation Test</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4CFSHYMM3E"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-4CFSHYMM3E', {
    debug_mode: true
  });
</script>

</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;">

<button id="donateButton" style="padding:20px 40px;font-size:20px;cursor:pointer;">
  Donate
</button>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const donateButton = document.getElementById("donateButton");

  donateButton.addEventListener("click", function() {

    console.log("Donate clicked → sending purchase event");

    gtag("event", "purchase", {
      transaction_id: "donate_" + Date.now(),
      value: 700,
      currency: "USD",
      items: [{
        item_id: "donation",
        item_name: "Test Donation",
        price: 700,
        quantity: 1
      }]
    });

    console.log("Purchase event sent");

  });

});
</script>

</body>
</html>
