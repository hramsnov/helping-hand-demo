<!-- ОРИГИНАЛЬНАЯ кнопка Fundraise Up -->
<a href="#XJKDHSTQ"></a>

<script>

// =====================================
// TRACK FUNDRAISE UP EVENTS (NO JS API)
// =====================================

window.addEventListener("message", function(event) {

  // Security check: accept only FundraiseUp messages
  if (!event.origin.includes("fundraiseup.com")) return;

  var data = event.data;

  if (!data || !data.event) return;

  // 1️⃣ Checkout opened
  if (data.event === "checkoutOpen") {
    gtag('event', 'begin_checkout', {
      currency: 'USD'
    });
  }

  // 2️⃣ Successful donation
  if (data.event === "donationComplete") {

    gtag('event', 'purchase', {
      transaction_id: data.transaction?.id || ('TEST_' + Date.now()),
      currency: data.donation?.currency || 'USD',
      value: data.donation?.amount || 700,
      items: [{
        item_id: data.transaction?.id || 'donation',
        item_name: 'Donation',
        price: data.donation?.amount || 700,
        quantity: 1
      }]
    });

  }

});

</script>
