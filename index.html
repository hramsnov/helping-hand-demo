<h1>Helping Hand Donation Demo</h1>
<a href="#XJKDHSTQ"></a>

<script>

console.log("Tracking script loaded");

// ==============================
// DEBUG: Log ALL postMessages
// ==============================

window.addEventListener("message", function(event) {
  console.log("POSTMESSAGE RECEIVED:", event.origin, event.data);
});

// ==============================
// Detect FundraiseUp iframe
// ==============================

let purchaseSent = false;
let checkoutOpened = false;

const observer = new MutationObserver(function() {

  const iframe = document.querySelector('iframe');

  if (iframe && !checkoutOpened) {
    checkoutOpened = true;
    console.log("Iframe detected:", iframe.src);

    gtag('event', 'begin_checkout');
    console.log("GA4 begin_checkout sent");
  }

  if (!document.querySelector('iframe')
      && checkoutOpened
      && !purchaseSent) {

    purchaseSent = true;

    console.log("Iframe removed — sending purchase");

    gtag('event', 'purchase', {
      transaction_id: 'FU_' + Date.now(),
      currency: 'USD',
      value: 700,
      items: [{
        item_id: 'donation',
        item_name: 'Donation',
        price: 700,
        quantity: 1
      }]
    });

    console.log("GA4 purchase sent");
  }

});

observer.observe(document.body, {
  childList: true,
  subtree: true
});

</script>
