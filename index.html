(function(w,d,s,n,a){
if(!w[n]){
var l='call,catch,on,once,set,then,track'.split(','),i,
o=function(n){
return'function'==typeof n?o.l.push([arguments])&&o:
function(){return o.l.push([n,arguments])&&o}

<h1>Helping Hand Donation Demo</h1>

<!-- ОРИГИНАЛЬНАЯ КНОПКА -->
<a href="#XJKDHSTQ"></a>

<script>

// ===============================
// 1️⃣ TRACK CLICK (checkout open)
// ===============================

document.addEventListener("click", function(e) {

  const link = e.target.closest('a[href="#XJKDHSTQ"]');

  if (link) {
    console.log("Checkout clicked");

    gtag('event', 'begin_checkout', {
      currency: 'USD'
    });

    console.log("GA4 begin_checkout sent");
  }

});


// ===============================
// 2️⃣ TRACK IFRAME CLOSE (purchase)
// ===============================

let checkoutWasOpened = false;
let purchaseSent = false;

// Detect iframe appearance
const observer = new MutationObserver(function() {

  const iframe = document.querySelector('iframe[src*="fundraiseup"]');

  if (iframe && !checkoutWasOpened) {
    checkoutWasOpened = true;
    console.log("Checkout iframe detected");
  }

  // If iframe disappeared after being opened → donation likely completed
  if (!document.querySelector('iframe[src*="fundraiseup"]')
      && checkoutWasOpened
      && !purchaseSent) {

    purchaseSent = true;

    console.log("Checkout closed — sending purchase");

    gtag('event', 'purchase', {
      transaction_id: 'FU_' + Date.now(),
      currency: 'USD',
      value: 700,
      items: [{
        item_id: 'donation',
        item_name: 'Donation',
        price: 700,
        quantity: 1
      }]
    });

    console.log("GA4 purchase sent");
  }

});

observer.observe(document.body, {
  childList: true,
  subtree: true
});

</script>
