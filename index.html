<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Page</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4CFSHYMM3E"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-4CFSHYMM3E', { debug_mode: true });
</script>

</head>
<body>

<!-- ТВОЙ ОРИГИНАЛЬНЫЙ КОД САЙТА И ВИДЖЕТ ДОНАТА ОСТАЮТСЯ ЗДЕСЬ -->
<!-- НИЧЕГО НЕ УДАЛЯЙ И НЕ МЕНЯЙ -->

<script>
(function() {

  function sendPurchase() {
    console.log("Donate detected → sending $700 purchase");

    gtag("event", "purchase", {
      transaction_id: "donate_" + Date.now(),
      value: 700,
      currency: "USD",
      items: [{
        item_id: "donation",
        item_name: "Real Donation",
        price: 700,
        quantity: 1
      }]
    });
  }

  document.addEventListener("click", function(e) {

    const element = e.target.closest("button, a, div");

    if (!element) return;

    const text = (element.innerText || "").toLowerCase();

    if (text.includes("donate")) {
      sendPurchase();
    }

  }, true);

})();
</script>

</body>
</html>
