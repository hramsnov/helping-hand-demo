var l='call,catch,on,once,set,then,track'.split(','),i,

function(){return o.l.push([n,arguments])&&o}

<h1>Helping Hand Donation Demo</h1>

<!-- ОРИГИНАЛЬНАЯ КНОПКА -->
<a href="#XJKDHSTQ"></a>

<script>

// ===============================
// FUNDRAISE UP → GA4 INTEGRATION
// ===============================

let purchaseSent = false;
let checkoutSent = false;

window.addEventListener("message", function(event) {

  // Принимаем только сообщения от Fundraise Up
  if (!event.origin.includes("fundraiseup.com")) return;

  const data = event.data;

  if (!data || typeof data !== "object") return;

  console.log("FundraiseUp message:", data);

  // 1️⃣ Checkout opened
  if (data.event === "checkoutOpen" && !checkoutSent) {
    checkoutSent = true;

    gtag('event', 'begin_checkout', {
      currency: data.currency || 'USD'
    });

    console.log("GA4 begin_checkout sent");
  }

  // 2️⃣ Donation completed
  if (data.event === "donationComplete" && !purchaseSent) {
    purchaseSent = true;

    const amount = data.donation?.amount || 0;
    const currency = data.donation?.currency || 'USD';
    const transactionId = data.transaction?.id || ('FU_' + Date.now());

    gtag('event', 'purchase', {
      transaction_id: transactionId,
      currency: currency,
      value: amount,
      items: [{
        item_id: transactionId,
        item_name: 'Donation',
        price: amount,
        quantity: 1
      }]
    });

    console.log("GA4 purchase sent:", amount, currency);
  }

});

</script>
