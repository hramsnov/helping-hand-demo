<!-- ОРИГИНАЛЬНАЯ КНОПКА -->
<a href="#XJKDHSTQ"></a>

<script>

console.log("Tracking script loaded");

let purchaseSent = false;
let checkoutSent = false;

window.addEventListener("message", function(event) {

  if (!event.origin.includes("fundraiseup.com")) return;

  const data = event.data;

  if (!data) return;

  console.log("FundraiseUp RAW message:", data);

  // Если строка — пробуем распарсить
  let payload = data;
  if (typeof data === "string") {
    try {
      payload = JSON.parse(data);
    } catch(e) {
      return;
    }
  }

  if (typeof payload !== "object") return;

  console.log("FundraiseUp parsed message:", payload);

  // =========================
  // CHECKOUT OPEN
  // =========================
  if (!checkoutSent &&
      (payload.event === "checkoutOpen" ||
       payload.type === "checkout_open" ||
       payload.name === "checkout_open")) {

    checkoutSent = true;

    gtag('event', 'begin_checkout');

    console.log("GA4 begin_checkout sent");
  }

  // =========================
  // DONATION COMPLETE
  // =========================
  if (!purchaseSent &&
      (payload.event === "donationComplete" ||
       payload.type === "donation_complete" ||
       payload.name === "donation_complete")) {

    purchaseSent = true;

    // Пытаемся найти сумму в любом возможном поле
    let amount =
      payload.donation?.amount ||
      payload.amount ||
      payload.total ||
      payload.value ||
      0;

    let currency =
      payload.donation?.currency ||
      payload.currency ||
      'USD';

    let transactionId =
      payload.transaction?.id ||
      payload.transaction_id ||
      ('FU_' + Date.now());

    amount = parseFloat(amount);

    console.log("Extracted:", amount, currency, transactionId);

    if (!amount || amount <= 0) {
      console.log("Amount not detected, using fallback 700");
      amount = 700;
    }

    gtag('event', 'purchase', {
      transaction_id: transactionId,
      currency: currency,
      value: amount,
      items: [{
        item_id: transactionId,
        item_name: 'Donation',
        price: amount,
        quantity: 1
      }]
    });

    console.log("GA4 purchase sent");

  }

});

</script>
