var l='call,catch,on,once,set,then,track'.split(','),i,

<body>

<h1>Helping Hand Donation Demo</h1>

<!-- Оригинальная кнопка Fundraise Up -->
<a href="#XJKDHSTQ"></a>

<script>

// ===========================================
// TRACK CHECKOUT OPEN (postMessage listener)
// ===========================================

window.addEventListener("message", function(event) {

  if (!event.origin.includes("fundraiseup.com")) return;

  var data = event.data;
  if (!data || !data.event) return;

  if (data.event === "checkoutOpen") {
    gtag('event', 'begin_checkout');
  }

});


// ===========================================
// TRACK PURCHASE BY READING THANK YOU TEXT
// ===========================================

let purchaseSent = false;

function observeThankYou() {

  const observer = new MutationObserver(function() {

    if (purchaseSent) return;

    // Ищем thank-you заголовок
    const thankYouEl = document.querySelector('[data-qa="thank-you-header-label"]');

    if (!thankYouEl) return;

    const text = thankYouEl.innerText;

    // Пример текста:
    // "You've started a ฿810 THB monthly donation."

    const match = text.match(/([\d,\.]+)\s?([A-Z]{3})/);

    if (!match) return;

    let amount = match[1].replace(/,/g, '');
    let currency = match[2];

    amount = parseFloat(amount);

    if (!amount || !currency) return;

    purchaseSent = true;

    gtag('event', 'purchase', {
      transaction_id: 'FU_' + Date.now(),
      currency: currency,
      value: amount,
      items: [{
        item_id: 'donation',
        item_name: 'Monthly Donation',
        price: amount,
        quantity: 1
      }]
    });

    console.log("GA4 purchase sent:", amount, currency);

  });

  observer.observe(document.body, {
    childList: true,
    subtree: true
  });

}

observeThankYou();

</script>
